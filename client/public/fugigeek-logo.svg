<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 60" width="260" height="60" role="img">
  <title>Fugigeek</title>
  <desc>Fugigeek logo — hexagon mark with F letterform and wordmark</desc>

  <!-- Hexagon mark -->
  <polygon points="34,4 56,17 56,43 34,56 12,43 12,17" fill="#2563eb"/>

  <!-- F letterform -->
  <rect x="20" y="16" width="20" height="4" rx="1.5" fill="white"/>
  <rect x="20" y="24" width="15" height="4" rx="1.5" fill="white"/>
  <rect x="20" y="32" width="4" height="16" rx="1.5" fill="white"/>

  <!-- Spark node -->
  <circle cx="60" cy="10" r="5.5" fill="#60a5fa"/>
  <circle cx="60" cy="10" r="2.8" fill="white"/>
  <line x1="56" y1="15" x2="57" y2="13" stroke="#60a5fa" stroke-width="1.2"/>

  <!-- Wordmark -->
  <text x="72" y="38" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="26" font-weight="700" fill="#0f172a" letter-spacing="-0.5">Fugi<tspan fill="#2563eb">geek</tspan></text>
</svg>
